<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard - Coding Camp</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="theme-toggle-container">
        <button id="themeToggleBtn" class="btn-secondary">🌙 dark mode</button>
    </div>

    <div class="dashboard-container">
        
        <header class="dashboard-card header-card">
            <h1 id="clock">00:00:00</h1>
            <p id="date">date, month 00, 2026</p>
            <div class="greeting-container">
                <span id="greetingText">good morning</span>, 
                <input type="text" id="customNameInput" placeholder="input name here..." maxlength="15">
            </div>
        </header>

        <div class="main-content-grid">
            
            <section class="dashboard-card status-card">
                <h2>focus timer</h2>
                <div class="timer-display" id="timerDisplay">25:00</div>
                <div class="timer-controls">
                    <button id="startTimerBtn" class="btn-primary">start</button>
                    <button id="stopTimerBtn" class="btn-danger">stop</button>
                    <button id="resetTimerBtn" class="btn-secondary">reset</button>
                </div>
            </section>

            <section class="dashboard-card tasks-card">
                <div class="card-header-flex">
                    <h2>tasks</h2>
                    <select id="sortTasksSelect" class="sort-select">
                        <option value="default">default (as added)</option>
                        <option value="alpha">alphabetical (a-z)</option>
                        <option value="completed">completed first</option>
                    </select>
                </div>
                
                <form id="taskForm" class="input-group">
                    <input type="text" id="taskInput" placeholder="add a new task..." required>
                    <button type="submit" class="btn-primary">add</button>
                </form>
                
                <ul id="taskList" class="task-list">
                    </ul>
            </section>

            <section class="dashboard-card links-card">
                <h2>quick links</h2>
                <form id="linkForm" class="input-group-links">
                    <input type="text" id="linkNameInput" placeholder="link name" required>
                    <input type="url" id="linkUrlInput" placeholder="https://example.com" required>
                    <button type="submit" class="btn-primary">add link</button>
                </form>
                
                <div id="linksContainer" class="links-grid">
                    </div>
            </section>

        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
